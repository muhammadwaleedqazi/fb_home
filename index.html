<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar fb-navbar fixed-top">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <span class="fb-logo">facebook</span>
        <img src="https://randomuser.me/api/portraits/women/44.jpg" class="nav-profile">
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container main-content">
    <div class="row">

        <!-- LEFT SIDEBAR -->
        <aside class="col-lg-3 d-none d-lg-block">
            <div class="side-card">
                <div class="profile">
                    <img src="https://randomuser.me/api/portraits/women/44.jpg">
                    <span>Josephine Williams</span>
                </div>

                <div class="side-item">Friends</div>
                <div class="side-item">Memories</div>
                <div class="side-item">Saved</div>
                <div class="side-item">Groups</div>
            </div>
        </aside>

        <!-- FEED -->
        <main class="col-lg-6">

            <!-- STORIES -->
            <div class="stories-container">
                <div class="story-card add-story">
                    <span>+</span>
                    <p>Create Story</p>
                </div>

                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
                    <span>Betty</span>
                </div>

                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d">
                    <span>Dennis</span>
                </div>

                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2">
                    <span>Cynthia</span>
                </div>

                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
                    <span>Tom</span>
                </div>
            </div>

            <!-- CREATE POST -->
            <div class="card post-card">
                <div class="create-post">
                    <img src="https://randomuser.me/api/portraits/women/44.jpg">
                    <input type="text" placeholder="What's on your mind?">
                </div>
            </div>

            <!-- POST -->
            <div class="card post-card">
                <div class="post-header">
                    <img src="https://randomuser.me/api/portraits/women/65.jpg">
                    <div>
                        <h6>Fiona Ozeri</h6>
                        <small>5h · Public</small>
                    </div>
                </div>

                <p class="post-text">
                    This has some great healthy recipes 🥗
                </p>

                <img class="post-image"
                     src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

                <div class="post-actions">
                    <span>Like</span>
                    <span>Comment</span>
                    <span>Share</span>
                </div>
            </div>

        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="col-lg-3 d-none d-lg-block">
            <div class="side-card">
                <h6>Contacts</h6>

                <div class="contact">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg">
                    Dennis
                </div>

                <div class="contact">
                    <img src="https://randomuser.me/api/portraits/women/22.jpg">
                    Sarah
                </div>
            </div>
        </aside>

    </div>
</div>

</body>
</html>
