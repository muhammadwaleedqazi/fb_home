<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar fb-navbar fixed-top">
    <div class="container-fluid">

        <div class="d-flex align-items-center">
            <span class="fb-logo">facebook</span>
            <input type="text" class="fb-search ms-3" placeholder="Search Facebook">
        </div>

        <div class="fb-center-icons d-none d-md-flex">
            <span class="icon active">🏠</span>
            <span class="icon">🎥</span>
            <span class="icon">🛒</span>
            <span class="icon">👥</span>
        </div>

        <div class="fb-right-icons">
            <img src="https://randomuser.me/api/portraits/women/44.jpg" class="nav-profile">
        </div>

    </div>
</nav>

<!-- MAIN -->
<div class="container-fluid main-content">
    <div class="row">

        <!-- LEFT SIDEBAR -->
        <div class="col-md-3 d-none d-md-block left-sidebar">
            <div class="sidebar-profile">
                <img src="https://randomuser.me/api/portraits/women/44.jpg">
                <span>Josephine Williams</span>
            </div>

            <div class="sidebar-item">Watch</div>
            <div class="sidebar-item">Events</div>
            <div class="sidebar-item">Friends</div>
            <div class="sidebar-item">Memories</div>
        </div>

        <!-- FEED -->
        <div class="col-md-6 feed">

            <!-- STORIES -->
            <div class="stories">
                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
                    <span>Add Story</span>
                </div>
                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
                    <span>Betty</span>
                </div>
                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d">
                    <span>Dennis</span>
                </div>
                <div class="story-card">
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2">
                    <span>Cynthia</span>
                </div>
            </div>

            <!-- CREATE POST -->
            <div class="post-card create-post">
                <div class="create-post-top">
                    <img src="https://randomuser.me/api/portraits/women/44.jpg">
                    <input type="text" placeholder="What's on your mind, Josephine?">
                </div>
                <div class="post-actions">
                    <span>📷 Photo</span>
                    <span>😊 Feeling</span>
                    <span>📍 Location</span>
                </div>
            </div>

            <!-- POST -->
            <div class="post-card">
                <div class="post-header">
                    <img src="https://randomuser.me/api/portraits/women/65.jpg">
                    <div>
                        <h6>Fiona Ozeri</h6>
                        <small>5h · Public</small>
                    </div>
                </div>
                <p>This has some great healthy recipes 🥗</p>
                <img class="post-image" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
            </div>

        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="col-md-3 d-none d-md-block right-sidebar">
            <h6>Sponsored</h6>
            <img class="sponsored-img" src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

            <hr>

            <h6>Contacts</h6>
            <div class="contact">
                <img src="https://randomuser.me/api/portraits/men/32.jpg"> Dennis
            </div>
            <div class="contact">
                <img src="https://randomuser.me/api/portraits/men/45.jpg"> Eric
            </div>
        </div>

    </div>
</div>

</body>
</html>
