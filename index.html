<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facebook</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar fb-navbar fixed-top">
    <div class="container-fluid">
        <div class="d-flex align-items-center">
            <span class="fb-logo">facebook</span>
            <input type="text" class="fb-search ms-3 d-none d-md-block" placeholder="Search Facebook">
        </div>

        <img src="https://randomuser.me/api/portraits/women/44.jpg" class="nav-profile">
    </div>
</nav>

<!-- MAIN -->
<div class="container-fluid main-content">
    <div class="row">

        <!-- LEFT SIDEBAR -->
        <aside class="col-lg-3 d-none d-lg-block sidebar">
            <div class="profile-row">
                <img src="https://randomuser.me/api/portraits/women/44.jpg">
                <span>Josephine Williams</span>
            </div>

            <div class="sidebar-item">Friends</div>
            <div class="sidebar-item">Memories</div>
            <div class="sidebar-item">Saved</div>
            <div class="sidebar-item">Groups</div>
        </aside>

        <!-- FEED -->
        <main class="col-lg-6 col-md-8 feed mx-auto">

            <!-- CREATE POST -->
            <div class="card post-card">
                <div class="create-post">
                    <img src="https://randomuser.me/api/portraits/women/44.jpg">
                    <input type="text" placeholder="What's on your mind, Josephine?">
                </div>
            </div>

            <!-- POST -->
            <div class="card post-card">
                <div class="post-header">
                    <img src="https://randomuser.me/api/portraits/women/65.jpg">
                    <div>
                        <h6>Fiona Ozeri</h6>
                        <small>5h · Public</small>
                    </div>
                </div>

                <p class="post-text">
                    This has some great healthy recipes 🥗
                </p>

                <img class="post-image"
                     src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

                <div class="post-footer">
                    <span>Like</span>
                    <span>Comment</span>
                    <span>Share</span>
                </div>
            </div>

            <!-- POST -->
            <div class="card post-card">
                <div class="post-header">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg">
                    <div>
                        <h6>Dennis Han</h6>
                        <small>1d · Public</small>
                    </div>
                </div>

                <p class="post-text">
                    Consistency beats motivation 💪
                </p>

                <div class="post-footer">
                    <span>Like</span>
                    <span>Comment</span>
                    <span>Share</span>
                </div>
            </div>

        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="col-lg-3 d-none d-lg-block sidebar">
            <h6 class="mb-3">Contacts</h6>

            <div class="contact">
                <img src="https://randomuser.me/api/portraits/men/45.jpg">
                Eric Jones
            </div>

            <div class="contact">
                <img src="https://randomuser.me/api/portraits/women/22.jpg">
                Sarah Lee
            </div>
        </aside>

    </div>
</div>

</body>
</html>
